<script>

let selectedImage = null;

document
    .getElementById("imageInput")
    .addEventListener("change", function(event) {

        const file = event.target.files[0];

        if (!file) {
            return;
        }

        const reader = new FileReader();

        reader.onload = function(e) {

            selectedImage = e.target.result;

            console.log(
                "Imagen cargada OK"
            );
        };

        reader.readAsDataURL(file);
    });

document
    .getElementById("generateBtn")
    .addEventListener("click", async function() {

        try {

            console.log(
                "selectedImage:",
                selectedImage
            );

            if (!selectedImage) {

                alert(
                    "Seleccione una imagen"
                );

                return;
            }

            // =====================================
            // cargar template
            // =====================================

            const response =
                await fetch("template.docx");

            console.log(
                "status template:",
                response.status
            );

            if (!response.ok) {

                throw new Error(
                    "No existe template.docx"
                );
            }

            const arrayBuffer =
                await response.arrayBuffer();

            const zip =
                new PizZip(arrayBuffer);

            // =====================================
            // modulo imagen
            // =====================================

            const imageModule =
                new ImageModule({

                    centered: false,

                    getImage: function(tagValue) {

                        console.log(
                            "tagValue:",
                            tagValue
                        );

                        if (!tagValue) {

                            throw new Error(
                                "Imagen undefined"
                            );
                        }

                        const base64Data =
                            tagValue.split(",")[1];

                        const binaryString =
                            atob(base64Data);

                        const len =
                            binaryString.length;

                        const bytes =
                            new Uint8Array(len);

                        for (
                            let i = 0;
                            i < len;
                            i++
                        ) {

                            bytes[i] =
                                binaryString.charCodeAt(i);
                        }

                        return bytes;
                    },

                    getSize: function() {

                        return [300, 200];
                    }
                });

            // =====================================
            // crear documento
            // =====================================

            const doc =
                new window.docxtemplater(
                    zip,
                    {
                        modules: [imageModule]
                    }
                );

            // =====================================
            // render
            // =====================================

            doc.render({
                imagen: selectedImage
            });

            // =====================================
            // generar archivo
            // =====================================

            const blob =
                doc.getZip().generate({

                    type: "blob",

                    mimeType:
                        "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                });

            saveAs(
                blob,
                "documento1.docx"
            );

            console.log(
                "WORD generado OK"
            );

        }
        catch(error) {

            console.error(
                "ERROR:",
                error
            );

            alert(
                error.message
            );
        }
    });

</script>
