<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Generar Word con Imagen</title>
</head>

<body>

    <h2>Insertar Imagen en Word</h2>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

    <button id="generateBtn">
        Generar Word
    </button>

    <!-- ===================================================== -->
    <!-- LIBRERIAS -->
    <!-- ===================================================== -->

    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.min.js"></script>

    <script src="https://unpkg.com/docxtemplater@3.37.9/build/docxtemplater.js"></script>

    <script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- ===================================================== -->
    <!-- CODIGO -->
    <!-- ===================================================== -->

    <script>

        console.log("HTML cargado OK");

        console.log(
            "PizZip:",
            typeof PizZip
        );

        console.log(
            "docxtemplater:",
            typeof docxtemplater
        );

        console.log(
            "ImageModule:",
            typeof ImageModule
        );

        // =====================================================
        // VARIABLE GLOBAL IMAGEN
        // =====================================================

        let selectedImage = null;

        // =====================================================
        // SELECCIONAR IMAGEN
        // =====================================================

        document
            .getElementById("imageInput")
            .addEventListener(
                "change",
                function(event) {

                    const file =
                        event.target.files[0];

                    if (!file) {
                        return;
                    }

                    console.log(
                        "Archivo seleccionado:",
                        file.name
                    );

                    const reader =
                        new FileReader();

                    reader.onload =
                        function(e) {

                            selectedImage =
                                e.target.result;

                            console.log(
                                "Imagen cargada OK"
                            );
                        };

                    reader.readAsDataURL(file);
                }
            );

        // =====================================================
        // GENERAR WORD
        // =====================================================

        document
            .getElementById("generateBtn")
            .addEventListener(
                "click",
                async function() {

                    try {

                        console.log(
                            "Generando Word..."
                        );

                        // =====================================
                        // VALIDAR IMAGEN
                        // =====================================

                        if (!selectedImage) {

                            alert(
                                "Seleccione una imagen"
                            );

                            return;
                        }

                        // =====================================
                        // CARGAR TEMPLATE
                        // =====================================

                        const response =
                            await fetch(
                                "template.docx"
                            );

                        console.log(
                            "STATUS TEMPLATE:",
                            response.status
                        );

                        if (!response.ok) {

                            throw new Error(
                                "No existe template.docx"
                            );
                        }

                        // =====================================
                        // LEER WORD
                        // =====================================

                        const arrayBuffer =
                            await response.arrayBuffer();

                        // =====================================
                        // ZIP WORD
                        // =====================================

                        const zip =
                            new PizZip(
                                arrayBuffer
                            );

                        // =====================================
                        // MODULO IMAGEN
                        // =====================================

                        const imageModule =
                            new ImageModule({

                                centered: false,

                                getImage:
                                    function(tagValue) {

                                        console.log(
                                            "Procesando imagen..."
                                        );

                                        const base64Data =
                                            tagValue.split(",")[1];

                                        const binaryString =
                                            atob(base64Data);

                                        const len =
                                            binaryString.length;

                                        const bytes =
                                            new Uint8Array(len);

                                        for (
                                            let i = 0;
                                            i < len;
                                            i++
                                        ) {

                                            bytes[i] =
                                                binaryString.charCodeAt(i);
                                        }

                                        return bytes;
                                    },

                                getSize:
                                    function() {

                                        // ancho x alto
                                        return [300, 200];
                                    }
                            });

                        // =====================================
                        // CREAR DOCUMENTO
                        // =====================================

                        const doc =
                            new window.docxtemplater(
                                zip,
                                {
                                    modules: [
                                        imageModule
                                    ],
                                    paragraphLoop: true,
                                    linebreaks: true
                                }
                            );

                        // =====================================
                        // REEMPLAZAR VARIABLES
                        // =====================================

                        doc.render({

                            imagen:
                                selectedImage
                        });

                        // =====================================
                        // GENERAR WORD
                        // =====================================

                        const blob =
                            doc.getZip().generate({

                                type: "blob",

                                mimeType:
                                    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                            });

                        // =====================================
                        // DESCARGAR
                        // =====================================

                        saveAs(
                            blob,
                            "documento.docx"
                        );

                        console.log(
                            "WORD generado OK"
                        );
                    }
                    catch(error) {

                        console.error(
                            "ERROR:",
                            error
                        );

                        alert(
                            error.message
                        );
                    }
                }
            );

    </script>

</body>

</html>
