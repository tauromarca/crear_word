<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Word - Solución Undefined</title>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.1/build/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; margin: auto; }
        #status { margin-top: 20px; font-weight: bold; color: #0078d4; }
        button { width: 100%; background: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generador de Reporte</h2>
    <p>Seleccione imagen (.jpg o .png):</p>
    <input type="file" id="imageInput" accept="image/*">
    <button id="generateBtn" disabled>Generar Word</button>
    <div id="status">Esperando imagen...</div>
</div>

<script>
// ============================================================
// MÓDULO DE IMAGEN MEJORADO (Elimina el error 'undefined')
// ============================================================
function MyImageModule() {}
MyImageModule.prototype.optionsTransformer = function(options, doc) { this.doc = doc; return options; };
MyImageModule.prototype.parse = function(type, data) {
    // Si el tag empieza con %, lo marcamos como imagen
    if (type === "tag" && data.tag.charAt(0) === "%") {
        return { type: "placeholder", value: data.tag.substr(1) };
    }
    return null;
};
MyImageModule.prototype.render = function(part, options) {
    if (part.type !== "placeholder") return null;
    const tagValue = options.scopeManager.getValue(part.value);
    
    // Si no hay valor, devolvemos vacío para que no escriba 'undefined'
    if (!tagValue) return { value: "" };

    const numId = Math.floor(Math.random() * 1e6);
    const rId = "rIdImg" + numId;
    const imgName = "img_" + numId + ".png";

    // 1. Inyectar imagen en el ZIP
    this.doc.zip.file("word/media/" + imgName, tagValue, { binary: true });

    // 2. Registrar la relación en el XML interno de Word
    const relsPath = "word/_rels/document.xml.rels";
    let rels = this.doc.zip.file(relsPath).asText();
    const relXml = `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/${imgName}"/>`;
    rels = rels.replace("</Relationships>", relXml + "</Relationships>");
    this.doc.zip.file(relsPath, rels);

    // 3. XML para dibujar la imagen (Tamaño 450x350 px aprox)
    const cx = Math.round(450 * 9525); 
    const cy = Math.round(350 * 9525);
    const xml = `<w:run><w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0"><wp:extent cx="${cx}" cy="${cy}"/><wp:docPr id="${numId}" name="Img"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:blipFill><a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:run>`;
    
    return { value: xml };
};

// =====================================
// LÓGICA DE CONTROL
// =====================================
let imageArrayBuffer = null;
const status = document.getElementById("status");
const btn = document.getElementById("generateBtn");

document.getElementById("imageInput").addEventListener("change", async function(e) {
    const file = e.target.files[0];
    if (file) {
        imageArrayBuffer = await file.arrayBuffer();
        status.textContent = "✅ Imagen cargada.";
        btn.disabled = false;
    }
});

btn.addEventListener("click", async function() {
    status.textContent = "⏳ Generando...";
    try {
        // 1. Leer plantilla
        const response = await fetch("template.docx");
        if (!response.ok) throw new Error("No se encontró template.docx en el repositorio.");
        const content = await response.arrayBuffer();

        // 2. Cargar ZIP
        const zip = new window.PizZip(content);

        // 3. Instanciar Docxtemplater
        const doc = new window.docxtemplater(zip, {
            delimiters: { start: "{", end: "}" },
            modules: [new MyImageModule()],
            // Esto evita que aparezca la palabra 'undefined' si algo falla
            nullGetter: function() { return ""; }
        });

        // 4. Pasar los datos
        doc.setData({
            imagen: new Uint8Array(imageArrayBuffer)
        });

        // 5. Renderizar
        doc.render();

        // 6. Descargar
        const out = doc.getZip().generate({ type: "blob" });
        window.saveAs(out, "Reporte_Final.docx");
        status.textContent = "🚀 ¡Éxito!";

    } catch (error) {
        console.error(error);
        status.textContent = "❌ Error: " + error.message;
    }
});
</script>
</body>
</html>
