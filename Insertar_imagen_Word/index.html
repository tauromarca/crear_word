<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Generar Word con Imagen</title>
</head>

<body>

<input type="file" id="imageInput" accept="image/*">

<button id="generateBtn">
  Generar Word
</button>

<script src="pizzip.min.js"></script>
<script src="docxtemplater.js"></script>

<script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

<script src="FileSaver.min.js"></script>

<script>

console.log("HTML cargado OK");

let selectedImage = null;

// ======================================
// INPUT IMAGEN
// ======================================

document
.getElementById("imageInput")
.addEventListener("change", function(event) {

    const file = event.target.files[0];

    if (!file) {
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {

        selectedImage = e.target.result;

        console.log("Imagen cargada");
    };

    reader.readAsDataURL(file);
});

// ======================================
// GENERAR WORD
// ======================================

document
.getElementById("generateBtn")
.addEventListener("click", async function() {

    try {

        if (!selectedImage) {

            alert("Seleccione imagen");

            return;
        }

        const response =
            await fetch("template.docx");

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        const zip =
            new PizZip(arrayBuffer);

        const imageModule =
            new ImageModule({

                centered: false,

                getImage: function(tagValue) {

                    const base64Data =
                        tagValue.split(",")[1];

                    const binaryString =
                        atob(base64Data);

                    const len =
                        binaryString.length;

                    const bytes =
                        new Uint8Array(len);

                    for (
                        let i = 0;
                        i < len;
                        i++
                    ) {

                        bytes[i] =
                            binaryString.charCodeAt(i);
                    }

                    return bytes;
                },

                getSize: function() {

                    return [300, 200];
                }
            });

        const doc =
            new window.docxtemplater(
                zip,
                {
                    modules: [imageModule]
                }
            );

        doc.render({
            imagen: selectedImage
        });

        const blob =
            doc.getZip().generate({

                type: "blob",

                mimeType:
                "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

        saveAs(
            blob,
            "documento.docx"
        );

        console.log(
            "WORD generado OK"
        );
    }
    catch(error) {

        console.error(error);

        alert(error.message);
    }
});

</script>

</body>
</html>
