<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Insertar Imagen Word</title>
</head>

<body>

    <h2>Generar Word con Imagen</h2>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

    <button id="generateBtn">
        Generar Word
    </button>

    <!-- ========================================= -->
    <!-- LIBRERIAS -->
    <!-- ========================================= -->

    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- ========================================= -->
    <!-- CODIGO -->
    <!-- ========================================= -->

    <script>

        console.log("HTML OK");

        let selectedFile = null;

        // =====================================
        // SELECCIONAR IMAGEN
        // =====================================

        document
            .getElementById("imageInput")
            .addEventListener(
                "change",
                function(event) {

                    selectedFile =
                        event.target.files[0];

                    console.log(
                        "Imagen seleccionada:",
                        selectedFile
                    );
                }
            );

        // =====================================
        // GENERAR WORD
        // =====================================

        document
            .getElementById("generateBtn")
            .addEventListener(
                "click",
                async function() {

                    try {

                        if (!selectedFile) {

                            alert(
                                "Seleccione imagen"
                            );

                            return;
                        }

                        // ============================
                        // LEER IMAGEN
                        // ============================

                        const imageBuffer =
                            await selectedFile.arrayBuffer();

                        // ============================
                        // CREAR DOCUMENTO
                        // ============================

                        const doc =
                            new docx.Document({

                                sections: [

                                    {

                                        properties: {},

                                        children: [

                                            new docx.Paragraph({

                                                children: [

                                                    new docx.TextRun({
                                                        text: "Imagen insertada:",
                                                        break: 2
                                                    })
                                                ]
                                            }),

                                            new docx.Paragraph({

                                                children: [

                                                    new docx.ImageRun({

                                                        data:
                                                            imageBuffer,

                                                        transformation: {

                                                            width: 400,
                                                            height: 300
                                                        }
                                                    })
                                                ]
                                            })
                                        ]
                                    }
                                ]
                            });

                        // ============================
                        // GENERAR WORD
                        // ============================

                        const blob =
                            await docx.Packer
                            .toBlob(doc);

                        // ============================
                        // DESCARGAR
                        // ============================

                        saveAs(
                            blob,
                            "documento.docx"
                        );

                        console.log(
                            "WORD generado OK"
                        );
                    }
                    catch(error) {

                        console.error(
                            "ERROR:",
                            error
                        );

                        alert(
                            error.message
                        );
                    }
                }
            );

    </script>

</body>

</html>
