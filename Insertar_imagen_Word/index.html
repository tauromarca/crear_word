<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Word Institucional - v3</title>
    <!-- Librerías desde CDN estable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.49.1/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding-top: 50px; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 450px; margin: auto; }
        #status { margin-top: 20px; font-weight: bold; color: #007bff; min-height: 1.5em; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        button { background: #0078d4; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador de Reporte</h2>
    <p style="color: #666; font-size: 0.9em;">Inserta imagen en <code>template.docx</code></p>
    
    <input type="file" id="imageInput" accept="image/*">
    <button id="generateBtn" disabled>Generar Documento Word</button>
    
    <div id="status">Seleccione una imagen del disco...</div>
</div>

<script>
// ============================================================
// MÓDULO DE IMAGEN INTEGRADO PRO
// ============================================================
function MyImageModule() {}
MyImageModule.prototype.optionsTransformer = function(options, doc) { this.doc = doc; return options; };
MyImageModule.prototype.parse = function(type, data) {
    if (type === "tag" && data.tag.charAt(0) === "%") {
        return { type: "placeholder", value: data.tag.substr(1) };
    }
    return null;
};
MyImageModule.prototype.render = function(part, options) {
    if (part.type !== "placeholder") return null;
    const tagValue = options.scopeManager.getValue(part.value);
    if (!tagValue) return { value: "" };

    // 1. Identificadores únicos
    const numId = Math.floor(Math.random() * 1000000);
    const rId = "rIdImg" + numId;
    const imgName = "image_injected_" + numId + ".png";
    
    // Tamaño en píxeles (puedes ajustarlo aquí)
    const width = 450; 
    const height = 300;

    // 2. Inyectar imagen en el contenedor ZIP
    this.doc.zip.file("word/media/" + imgName, tagValue, { binary: true });

    // 3. Registrar la relación en el archivo .rels
    const relsPath = "word/_rels/document.xml.rels";
    let relsContent = this.doc.zip.file(relsPath).asText();
    const newRel = `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/${imgName}"/>`;
    relsContent = relsContent.replace("</Relationships>", newRel + "</Relationships>");
    this.doc.zip.file(relsPath, relsContent);

    // 4. Inyectar tipo de contenido si no existe
    const ctPath = "[Content_Types].xml";
    let ctContent = this.doc.zip.file(ctPath).asText();
    if (ctContent.indexOf('Extension="png"') === -1) {
        ctContent = ctContent.replace("</Types>", '<Default Extension="png" ContentType="image/png"/></Types>');
        this.doc.zip.file(ctPath, ctContent);
    }

    // 5. XML DrawingML (Versión con namespaces forzados)
    const cx = Math.round(width * 9525); 
    const cy = Math.round(height * 9525);
    
    const xml = `
<w:run>
    <w:drawing>
        <wp:inline distT="0" distB="0" distL="0" distR="0">
            <wp:extent cx="${cx}" cy="${cy}"/>
            <wp:docPr id="${numId}" name="Imagen${numId}"/>
            <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
                <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
                    <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
                        <pic:nvPicPr>
                            <pic:cNvPr id="0" name="Picture${numId}"/>
                            <pic:cNvPicPr/>
                        </pic:nvPicPr>
                        <pic:blipFill>
                            <a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>
                            <a:stretch><a:fillRect/></a:stretch>
                        </pic:blipFill>
                        <pic:spPr>
                            <a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>
                            <a:prstGeom prst="rect"><a:avLst/></a:prstGeom>
                        </pic:spPr>
                    </pic:pic>
                </a:graphicData>
            </a:graphic>
        </wp:inline>
    </w:drawing>
</w:run>`;
    
    return { value: xml };
};

// =====================================
// LÓGICA DE LA APLICACIÓN
// =====================================
let imageUint8 = null;
const status = document.getElementById("status");
const btn = document.getElementById("generateBtn");

// Leer imagen desde el disco duro
document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        imageUint8 = new Uint8Array(event.target.result);
        status.textContent = "✅ Imagen cargada del disco.";
        btn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
});

// Proceso de generación
btn.addEventListener("click", async function() {
    status.textContent = "⏳ Generando documento...";
    try {
        // 1. Leer archivo template.docx (Debe estar en tu repo de GitHub)
        const response = await fetch("template.docx");
        if (!response.ok) throw new Error("No se encontró template.docx en el servidor.");
        const templateBuffer = await response.arrayBuffer();

        // 2. Cargar ZIP
        const zip = new window.PizZip(templateBuffer);

        // 3. Configurar motor
        const doc = new window.docxtemplater(zip, {
            delimiters: { start: "[[", end: "]]" },
            modules: [new MyImageModule()],
            nullGetter: () => ""
        });

        // 4. Inyectar datos
        doc.setData({
            imagen: imageUint8
        });

        // 5. Renderizar
        doc.render();

        // 6. Generar archivo y descargar
        const out = doc.getZip().generate({
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });

        window.saveAs(out, "Reporte_Final_Con_Imagen.docx");
        status.textContent = "🚀 ¡Documento generado con éxito!";

    } catch (error) {
        console.error("Detalle del error:", error);
        status.textContent = "❌ Error: " + error.message;
    }
});
</script>
</body>
</html>
