<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar Word con Imagen</title>
</head>
<body>

<input type="file" id="imageInput" accept="image/*">
<button id="generateBtn">Generar Word</button>

<script src="pizzip.min.js"></script>
<script src="docxtemplater.js"></script>
<script src="imagemodule.js"></script>
<script src="FileSaver.min.js"></script>

<script>

let selectedImage = null;

document.getElementById("imageInput").addEventListener("change", function(event) {

    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        selectedImage = e.target.result;
    };

    reader.readAsDataURL(file);
});

document.getElementById("generateBtn").addEventListener("click", async function() {

    if (!selectedImage) {
        alert("Seleccione una imagen");
        return;
    }

    // cargar plantilla word
    const response = await fetch("template.docx");
    const arrayBuffer = await response.arrayBuffer();

    const zip = new PizZip(arrayBuffer);

    const imageModule = new ImageModule({
        centered: false,

        getImage: function(tagValue) {

            // convertir base64 a binary
            const base64Data = tagValue.split(",")[1];

            return Uint8Array.from(
                atob(base64Data),
                c => c.charCodeAt(0)
            );
        },

        getSize: function() {

            return [300, 200];
        }
    });

    const doc = new window.docxtemplater(zip, {
        modules: [imageModule],
        paragraphLoop: true,
        linebreaks: true
    });

    doc.render({
        imagen: selectedImage
    });

    const blob = doc.getZip().generate({
        type: "blob",
        mimeType:
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    });

    saveAs(blob, "documento.docx");
});

</script>

</body>
</html>
