<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Generar Word con Imagen</title>
</head>

<body>

<input type="file" id="imageInput" accept="image/*">

<button id="generateBtn">
  Generar Word
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.6/pizzip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.9/docxtemplater.js"></script>

<script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

console.log("HTML cargado OK");

let selectedImage = null;

// ======================================
// CARGAR IMAGEN
// ======================================

document
.getElementById("imageInput")
.addEventListener("change", function(event) {

    const file = event.target.files[0];

    if (!file) {
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {

        selectedImage = e.target.result;

        console.log(
            "Imagen cargada"
        );
    };

    reader.readAsDataURL(file);
});

// ======================================
// GENERAR WORD
// ======================================

document
.getElementById("generateBtn")
.addEventListener("click", async function() {

    try {

        if (!selectedImage) {

            alert(
                "Seleccione imagen"
            );

            return;
        }

        // cargar template
        const response =
            await fetch("template.docx");

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        const zip =
            new PizZip(arrayBuffer);

        // modulo imagen
        const imageModule =
            new ImageModule({

                centered: false,

                getImage: function(tagValue) {

                    const base64Data =
                        tagValue.split(",")[1];

                    return Uint8Array.from(
                        atob(base64Data),
                        c => c.charCodeAt(0)
                    );
                },

                getSize: function() {

                    return [300, 200];
                }
            });

        // documento
        const doc =
            new window.docxtemplater(
                zip,
                {
                    modules: [imageModule]
                }
            );

        // reemplazo
        doc.render({
            imagen: selectedImage
        });

        // generar word
        const blob =
            doc.getZip().generate({

                type: "blob",

                mimeType:
                "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

        saveAs(
            blob,
            "documento.docx"
        );

        console.log(
            "WORD generado OK"
        );
    }
    catch(error) {

        console.error(
            "ERROR:",
            error
        );

        alert(
            error.message
        );
    }
});

</script>

</body>
</html>
