<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Word Institucional - Final Solution</title>
    <!-- LIBRERÍAS -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.49.1/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding-top: 50px; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 450px; margin: auto; }
        #status { margin-top: 20px; font-weight: bold; color: #007bff; min-height: 1.5em; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador de Ficha</h2>
    <p style="color: #666; font-size: 0.9em;">Cargar imagen local e insertar en <code>template.docx</code></p>
    
    <input type="file" id="imageInput" accept="image/*">
    <button id="generateBtn" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:10px;" disabled>
        Generar Documento Word
    </button>
    
    <div id="loader" class="loader"></div>
    <div id="status">Verificando sistema...</div>
</div>

<script>
// ============================================================
// MÓDULO DE IMAGEN (v4 - INYECCIÓN CERTIFICADA)
// ============================================================
function MyImageModule(options) {
    this.options = options || {};
}
MyImageModule.prototype.optionsTransformer = function(options, docxtemplater) {
    this.docxtemplater = docxtemplater; 
    return options;
};
MyImageModule.prototype.parse = function(type, data) {
    if (type === "tag" && data.tag.charAt(0) === "%") {
        return { type: "placeholder", value: data.tag.substr(1) };
    }
    return null;
};
MyImageModule.prototype.render = function(part, options) {
    if (part.type !== "placeholder") return null;
    const tagValue = options.scopeManager.getValue(part.value);
    
    // Si no hay imagen seleccionada, limpiar el tag
    if (!tagValue) return { value: "" };

    // 1. Configuración de nombres
    const rId = "rId999" + Math.floor(Math.random() * 1000); // ID muy alto para no chocar
    const imgName = "img_custom_" + rId + ".png";
    const zip = this.docxtemplater.zip;

    // 2. Inyectar el archivo binario en el ZIP
    zip.file("word/media/" + imgName, tagValue, { binary: true });

    // 3. Registrar la relación en word/_rels/document.xml.rels
    const relsPath = "word/_rels/document.xml.rels";
    let relsContent = zip.file(relsPath).asText();
    const relXml = `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/${imgName}"/>`;
    relsContent = relsContent.replace("</Relationships>", relXml + "</Relationships>");
    zip.file(relsPath, relsContent);

    // 4. Asegurar el Content Type en [Content_Types].xml
    const ctPath = "[Content_Types].xml";
    let ctContent = zip.file(ctPath).asText();
    if (ctContent.indexOf('Extension="png"') === -1) {
        ctContent = ctContent.replace("</Types>", '<Default Extension="png" ContentType="image/png"/></Types>');
        zip.file(ctPath, ctContent);
    }

    // 5. XML DrawingML con Namespaces explícitos (Tamaño 450x330)
    const cx = Math.round(450 * 9525); 
    const cy = Math.round(330 * 9525);
    
    const xml = `
<w:run>
    <w:drawing>
        <wp:inline distT="0" distB="0" distL="0" distR="0">
            <wp:extent cx="${cx}" cy="${cy}"/>
            <wp:docPr id="100" name="ImagenDinamica"/>
            <wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>
            <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
                <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
                    <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
                        <pic:nvPicPr>
                            <pic:cNvPr id="0" name="Picture"/>
                            <pic:cNvPicPr/>
                        </pic:nvPicPr>
                        <pic:blipFill>
                            <a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>
                            <a:stretch><a:fillRect/></a:stretch>
                        </pic:blipFill>
                        <pic:spPr>
                            <a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>
                            <a:prstGeom prst="rect"><a:avLst/></a:prstGeom>
                        </pic:spPr>
                    </pic:pic>
                </a:graphicData>
            </a:graphic>
        </wp:inline>
    </w:drawing>
</w:run>`;
    
    return { value: xml };
};

// =====================================
// LÓGICA DE CONTROL
// =====================================
let imageUint8 = null;
const status = document.getElementById("status");
const btn = document.getElementById("generateBtn");

window.onload = () => {
    if (window.PizZip) status.textContent = "✅ Sistema listo.";
};

document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        imageUint8 = new Uint8Array(event.target.result);
        status.textContent = "✅ Imagen cargada del disco.";
        btn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
});

btn.addEventListener("click", async function() {
    status.textContent = "⏳ Generando documento...";
    document.getElementById("loader").style.display = "block";

    try {
        const response = await fetch("template.docx");
        if (!response.ok) throw new Error("No se pudo leer template.docx");
        const content = await response.arrayBuffer();

        const PizZip = window.PizZip || window.pizzip;
        const zip = new PizZip(content);

        const doc = new window.docxtemplater(zip, {
            delimiters: { start: "[[", end: "]]" },
            modules: [new MyImageModule()],
            nullGetter: () => ""
        });

        // Pasar la imagen a la variable [[%imagen]]
        doc.setData({ imagen: imageUint8 });

        doc.render();

        const out = doc.getZip().generate({
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });

        window.saveAs(out, "Ficha_Final_Exitosa.docx");
        status.textContent = "🚀 ¡Documento generado con éxito!";

    } catch (error) {
        console.error("Detalle técnico:", error);
        status.textContent = "❌ Error: " + error.message;
    } finally {
        document.getElementById("loader").style.display = "none";
    }
});
</script>
</body>
</html>
