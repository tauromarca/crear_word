<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Institucional DTC</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        #status { color: #2c3e50; font-weight: 600; margin-top: 20px; line-height: 1.4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #map-view { width: 1000px; height: 800px; position: absolute; left: -10000px; } /* Procesamiento invisible */
    </style>
</head>
<body>
    <div class="card">
        <div id="loader" class="loader"></div>
        <div id="status">Iniciando sistema institucional...</div>
    </div>
    <div id="map-view"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://js.arcgis.com/4.29/"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
