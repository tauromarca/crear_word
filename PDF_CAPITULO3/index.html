<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://v2.convertapi.com;">
    <title>Generador Ficha DTC - Seguro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; text-align: center; padding-top: 40px; }
        .container { background: white; padding: 35px; border-radius: 10px; width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        #status { margin-top: 15px; font-weight: bold; color: #0078d4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Generando Ficha DTC</h2>
        <div id="loader" class="loader"></div>
        <!-- Hallazgo 2.1: El estado se maneja vía textContent -->
        <div id="status">Iniciando sistema seguro...</div>
    </div>

    <!-- Librerías locales (Hallazgo 3.1) -->
    <script src="pizzip.js"></script>
    <script src="docxtemplater.js"></script>
    <script src="FileSaver.min.js"></script>
    <!-- Librería para PDF (Opcional si usas ConvertAPI JS) -->
    <script src="https://unpkg.com/convertapi-js/lib/convertapi.js"></script>
    <!-- Lógica externalizada (Hallazgo 4.1) -->
    <script src="app.js"></script>
</body>
</html>
