<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        ArcGIS → Template Word
    </title>

    <link
        rel="stylesheet"
        href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    >

    <style>

        body {

            font-family: Arial;

            background: #f2f2f2;

            margin: 20px;

            text-align: center;
        }

        .card {

            background: white;

            padding: 20px;

            border-radius: 10px;

            max-width: 1000px;

            margin: auto;
        }

        #map-view {

            width: 100%;

            height: 500px;

            margin-bottom: 20px;
        }

        #final-preview {

            width: 100%;

            display: none;

            margin-bottom: 20px;
        }

        .btn {

            padding: 12px 25px;

            background: #27ae60;

            color: white;

            border: none;

            border-radius: 6px;

            cursor: pointer;

            font-size: 16px;

            display: none;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>
        ArcGIS → Template Word
    </h2>

    <div id="status">
        Iniciando...
    </div>

    <div id="map-view"></div>

    <img id="final-preview">

    <button
        id="btn-word"
        class="btn"
    >
        Generar Word
    </button>

</div>

<script src="https://js.arcgis.com/4.29/"></script>

<script src="app.js"></script>

</body>

</html>
