<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        ArcGIS a Word
    </title>

    <!-- ArcGIS -->
    <link
        rel="stylesheet"
        href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    >

    <style>

        body {

            font-family: Arial;

            margin: 20px;

            text-align: center;

            background: #f2f2f2;
        }

        .card {

            background: white;

            padding: 20px;

            border-radius: 10px;

            max-width: 1000px;

            margin: auto;
        }

        #map-view {

            width: 100%;

            height: 500px;

            margin-bottom: 20px;
        }

        #final-preview {

            width: 100%;

            display: none;

            margin-bottom: 20px;
        }

        .btn {

            padding: 12px 25px;

            background: #27ae60;

            color: white;

            border: none;

            border-radius: 6px;

            cursor: pointer;

            font-size: 16px;

            display: none;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>
        ArcGIS → Word
    </h2>

    <div id="status">
        Iniciando...
    </div>

    <div id="map-view"></div>

    <img id="final-preview">

    <button
        id="btn-word"
        class="btn"
    >
        Descargar Word
    </button>

</div>

<!-- ArcGIS -->
<script src="https://js.arcgis.com/4.29/"></script>

<!-- docx -->
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

<!-- filesaver -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- app -->
<script src="app.js"></script>

</body>

</html>
