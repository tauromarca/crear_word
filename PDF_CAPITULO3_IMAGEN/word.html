<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word Template
    </title>

</head>

<body>

<h2>
    Generando documento...
</h2>

<!-- ===================================== -->
<!-- EASY TEMPLATE X -->
<!-- ===================================== -->


<script src="https://cdn.jsdelivr.net/npm/easy-template-x@4.1.2/dist/browser/easy-template-x.min.js"></script>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

(async function () {

    try {

        console.log(
            "easyTemplateX:",
            window.easyTemplateX
        );
        
        console.log(
            "EasyTemplateX:",
            window.EasyTemplateX
        );
        // =====================================
        // LEER IMAGEN DESDE LOCALSTORAGE
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagenArcGIS en localStorage"
            );
        }

        console.log(
            "Imagen encontrada"
        );

        // =====================================
        // TEMPLATE WORD
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const templateBuffer =
            await response.arrayBuffer();

        console.log(
            "Template cargado"
        );

        // =====================================
        // DATOS TEMPLATE
        // =====================================

        const datos = {

            nombre:
                "Claudio Goldberg",

            fecha:
                new Date()
                .toLocaleDateString(),

            observacion:
                "Documento generado desde ArcGIS Experience Builder",

            imagen: {

                _type:
                    "image",

                source:
                    dataUrl,

                format:
                    dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",

                width:
                    600,

                height:
                    350
            }
        };

        console.log(
            "Datos preparados"
        );

        // =====================================
        // PROCESAR TEMPLATE
        // =====================================

        const resultado =
            await window.EasyTemplateX.process(
        
                templateBuffer,
        
                datos
            );
        console.log(
            "Documento procesado"
        );

        // =====================================
        // CREAR BLOB WORD
        // =====================================

        const blob =
            new Blob(

                [resultado],

                {

                    type:
                    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                }
            );

        // =====================================
        // DESCARGAR
        // =====================================

        saveAs(

            blob,

            "Resultado.docx"
        );

        document.body.innerHTML =
            "<h2>✅ Documento generado correctamente</h2>";
    }

    catch(error) {

        console.error(
            error
        );

        document.body.innerHTML =
            "<h2>❌ Error: " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
