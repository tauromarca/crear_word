<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word Template
    </title>

</head>

<body>

<h2>
    Generando documento...
</h2>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- ===================================== -->
<!-- EASY TEMPLATE X -->
<!-- ===================================== -->

<script type="module">

import {

    TemplateHandler

} from "https://cdn.jsdelivr.net/npm/easy-template-x@7.2.4/+esm";

(async function () {

    try {

        console.log(
            "TemplateHandler:",
            TemplateHandler
        );

        // =====================================
        // LEER DATOS ARC GIS
        // =====================================

        const datosArcGIS =
            JSON.parse(

                localStorage.getItem(
                    "datosWord"
                )
            );

        if (!datosArcGIS) {

            throw new Error(
                "No existen datosWord en localStorage"
            );
        }

        console.log(
            "Datos ArcGIS:",
            datosArcGIS
        );
        const imagenesAdjuntas =
            JSON.parse(
        
                localStorage.getItem(
                    "imagenesAdjuntas"
                )
            ) || [];
        const imagenesWord = [];
        
        for (const img of imagenesAdjuntas) {
        
            const response =
                await fetch(
                    img.dataUrl
                );
        
            const blob =
                await response.blob();
        
        imagenesWord.push({
        
            foto: {
        
                _type:
                    "image",
        
                source:
                    blob,
        
                format:
                    img.dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",
        
                width:
                    250,
        
                height:
                    180
            },
        
            nombre:
                img.nombre || ""
        });        
    }
        // =====================================
        // LEER IMAGEN
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagenArcGIS"
            );
        }

        console.log(
            "Imagen encontrada"
        );

        // =====================================
        // CONVERTIR IMAGEN A BLOB
        // =====================================

        const imageResponse =
            await fetch(
                dataUrl
            );

        const imageBlob =
            await imageResponse.blob();

        console.log(
            "Imagen convertida"
        );

        // =====================================
        // CARGAR TEMPLATE WORD
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const templateFile =
            await response.blob();

        console.log(
            "Template cargado"
        );

        // =====================================
        // DATOS TEMPLATE
        // =====================================
        const datos = {

            copropiedad_formalizada:
                datosArcGIS.copropiedad_formalizada || "",

            rut_copropiedad:
                datosArcGIS.rut_copropiedad || "",

            nombre_conjunto:
                datosArcGIS.nombre_conjunto || "",

            codigo_conjunto:
                datosArcGIS.codigo_conjunto|| "",

            objectid:
                datosArcGIS.objectid || "",

            imagen: {

                _type:
                    "image",

                source:
                    imageBlob,

                format:
                    dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",

                width:
                    250,

                height:
                    180
            },
            imagenes_adjuntas:
                imagenesWord

        };

        console.log(
            "Datos template:",
            datos
        );

        // =====================================
        // TEMPLATE HANDLER
        // =====================================

        const handler =
            new TemplateHandler();

        // =====================================
        // PROCESAR DOCUMENTO
        // =====================================

        const documento =
            await handler.process(

                templateFile,

                datos
            );

        console.log(
            "Documento procesado"
        );

        // =====================================
        // DESCARGAR WORD
        // =====================================

        saveAs(

            documento,

            "Resultado.docx"
        );

        console.log(
            "Documento descargado"
        );

        document.body.innerHTML =
            "<h2>✅ Documento generado correctamente</h2>";
    }

    catch(error) {

        console.error(
            error
        );

        document.body.innerHTML =
            "<h2>❌ Error: " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
