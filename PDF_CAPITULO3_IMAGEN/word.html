<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word
    </title>

</head>

<body>

<h2>
    Generando Word...
</h2>

<!-- ===================================== -->
<!-- PIZZIP -->
<!-- ===================================== -->

<script src="https://unpkg.com/pizzip@3.1.5/dist/pizzip.js"></script>

<!-- ===================================== -->
<!-- DOCXTEMPLATER -->
<!-- ===================================== -->

<script src="https://unpkg.com/docxtemplater@3.46.0/build/docxtemplater.js"></script>

<!-- ===================================== -->
<!-- IMAGE MODULE -->
<!-- ===================================== -->

<script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

(async function () {

    try {

        console.log(
            "PizZip:",
            typeof PizZip
        );

        console.log(
            "docxtemplater:",
            typeof docxtemplater
        );

        console.log(
            "ImageModule:",
            typeof ImageModule
        );

        // =====================================
        // LEER IMAGEN
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagen"
            );
        }

        // =====================================
        // TEMPLATE
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        // =====================================
        // ZIP
        // =====================================

        const zip =
            new PizZip(
                arrayBuffer
            );

        // =====================================
        // IMAGE MODULE
        // =====================================

        const imageModule =
            new ImageModule({

                centered: false,

                getImage:
                    function(tagValue) {

                        const base64Data =
                            tagValue.split(",")[1];

                        return Uint8Array.from(

                            atob(base64Data),

                            c => c.charCodeAt(0)
                        );
                    },

                getSize:
                    function() {

                        return [600, 350];
                    }
            });

        // =====================================
        // DOCXTEMPLATER
        // =====================================

        const doc =
            new window.docxtemplater(

                zip,

                {
                    modules: [
                        imageModule
                    ],

                    paragraphLoop: true,

                    linebreaks: true
                }
            );

        // =====================================
        // REEMPLAZAR VARIABLE
        // =====================================

        doc.render({

            imagen:
                dataUrl
        });

        // =====================================
        // GENERAR DOCX
        // =====================================

        const blob =
            doc.getZip().generate({

                type: "blob",

                mimeType:
                    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

        // =====================================
        // DESCARGAR
        // =====================================

        saveAs(

            blob,

            "MapaArcGIS.docx"
        );

        document.body.innerHTML =
            "<h2>✅ Word generado</h2>";
    }
    catch(error) {

        console.error(error);

        document.body.innerHTML =
            "<h2>❌ " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
