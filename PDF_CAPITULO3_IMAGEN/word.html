<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word
    </title>

</head>

<body>

<h2>
    Generando Word...
</h2>

<!-- ===================================== -->
<!-- DOCX.JS -->
<!-- ===================================== -->

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

(async function () {

    try {

        console.log(
            "docx:",
            typeof docx
        );

        // =====================================
        // LEER IMAGEN DESDE LOCALSTORAGE
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagenArcGIS en localStorage"
            );
        }

        console.log(
            "Imagen encontrada"
        );

        // =====================================
        // CONVERTIR BASE64 A ARRAYBUFFER
        // =====================================

        const response =
            await fetch(
                dataUrl
            );

        const blob =
            await response.blob();

        const imageBuffer =
            await blob.arrayBuffer();

        console.log(
            "Imagen convertida"
        );

        // =====================================
        // CREAR DOCUMENTO WORD
        // =====================================

        const documento =
            new docx.Document({

                sections: [

                    {

                        properties: {},

                        children: [

                            // =========================
                            // TITULO
                            // =========================

                            new docx.Paragraph({

                                spacing: {
                                    after: 300
                                },

                                children: [

                                    new docx.TextRun({

                                        text:
                                            "Mapa ArcGIS",

                                        bold: true,

                                        size: 32
                                    })
                                ]
                            }),

                            // =========================
                            // IMAGEN
                            // =========================

                            new docx.Paragraph({

                                children: [

                                    new docx.ImageRun({

                                        data:
                                            imageBuffer,

                                        transformation: {

                                            width: 600,

                                            height: 350
                                        }
                                    })
                                ]
                            })
                        ]
                    }
                ]
            });

        // =====================================
        // GENERAR DOCX
        // =====================================

        const archivoWord =
            await docx.Packer.toBlob(
                documento
            );

        console.log(
            "Word generado"
        );

        // =====================================
        // DESCARGAR
        // =====================================

        saveAs(

            archivoWord,

            "MapaArcGIS.docx"
        );

        document.body.innerHTML =
            "<h2>✅ Word generado correctamente</h2>";
    }

    catch(error) {

        console.error(
            error
        );

        document.body.innerHTML =
            "<h2>❌ Error: " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
