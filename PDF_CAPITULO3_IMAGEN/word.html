<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word Template
    </title>

</head>

<body>

<h2>
    Generando documento...
</h2>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- ===================================== -->
<!-- EASY TEMPLATE X -->
<!-- ===================================== -->

<script type="module">

import {

    TemplateHandler

} from "https://cdn.jsdelivr.net/npm/easy-template-x@7.2.4/+esm";

(async function () {

    try {

        console.log(
            "TemplateHandler:",
            TemplateHandler
        );

        // =====================================
        // LEER DATOS ARC GIS
        // =====================================

        const datosArcGIS =
            JSON.parse(

                localStorage.getItem(
                    "datosWord"
                )
            );

        if (!datosArcGIS) {

            throw new Error(
                "No existen datosWord en localStorage"
            );
        }

        console.log(
            "Datos ArcGIS:",
            datosArcGIS
        );
        const imagenesAdjuntas =
            JSON.parse(
        
                localStorage.getItem(
                    "imagenesAdjuntas"
                )
            ) || [];
        const imagenesWord = [];
        
        for (const img of imagenesAdjuntas) {
        
            const response =
                await fetch(
                    img.dataUrl
                );
        
            const blob =
                await response.blob();
        
        imagenesWord.push({
        
            foto: {
        
                _type:
                    "image",
        
                source:
                    blob,
        
                format:
                    img.dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",
        
                width:
                    250,
        
                height:
                    180
            },
        
            nombre_imagen:
                img.nombre || ""
        });        
    }
        // =====================================
        // LEER IMAGEN
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagenArcGIS"
            );
        }

        console.log(
            "Imagen encontrada"
        );

        // =====================================
        // CONVERTIR IMAGEN A BLOB
        // =====================================

        const imageResponse =
            await fetch(
                dataUrl
            );

        const imageBlob =
            await imageResponse.blob();

        console.log(
            "Imagen convertida"
        );

        // =====================================
        // CARGAR TEMPLATE WORD
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const templateFile =
            await response.blob();

        console.log(
            "Template cargado"
        );

        // =====================================
        // DATOS TEMPLATE
        // =====================================
        const datos = {
            PLAGAS:
                datosArcGIS.PLAGAS || "☐",
            
            ASBELTO_CUBIERTA:
                datosArcGIS.ASBELTO_CUBIERTA || "☐",
            
            ASBELTO_FACHADA:
                datosArcGIS.ASBELTO_FACHADA || "☐",
            
            ASBELTO_LOGGIA:
                datosArcGIS.ASBELTO_LOGGIA || "☐",
            
            ASBELTO_REDES:
                datosArcGIS.ASBELTO_REDES || "☐",
            
            RIESGO_REDES:
                datosArcGIS.RIESGO_REDES || "☐",
            
            RIESGO_ESTRUCTURA:
                datosArcGIS.RIESGO_ESTRUCTURA || "☐",
            
            RIESGO_ESCALERAS:
                datosArcGIS.RIESGO_ESCALERAS || "☐",
            
            RIESGO_TECHUMBRE:
                datosArcGIS.RIESGO_TECHUMBRE || "☐",
            
            REGULACION:
                datosArcGIS.REGULACION || "☐",
            
            EFICIENCIA_ENERGETICA:
                datosArcGIS.EFICIENCIA_ENERGETICA || "☐",
            
            ACONDICIONAMIENTO:
                datosArcGIS.ACONDICIONAMIENTO || "☐",
                        
            copropiedad_formalizada:
                datosArcGIS.copropiedad_formalizada || "",

            rut_copropiedad:
                datosArcGIS.rut_copropiedad || "",

            nombre_conjunto:
                datosArcGIS.nombre_conjunto || "",

            codigo_conjunto:
                datosArcGIS.codigo_conjunto|| "",
            nombre_copropiedad:
               datosArcGIS.nombre_copropiedad || "",
            copropiedad_beneficio:
                datosArcGIS.copropiedad_beneficio || "",
            obras_realizadas:
                datosArcGIS.obras_realizadas || "",
            nombre_direccion:
                datosArcGIS.nombre_direccion || "",
            numero_direccion:
                datosArcGIS.numero_direccion || "",
            comuna:
                datosArcGIS.comuna || "",
            n_departamentos:
                datosArcGIS.n_departamentos || "",
            superficie_promedio:
                datosArcGIS.superficie_promedio || "",
            anio_recepcion:
                datosArcGIS.anio_recepcion || "",
            nombre_revisor_ep:
                datosArcGIS.nombre_revisor_ep || "",
            representante_legal:
                datosArcGIS.representante_legal || "",
            rut_entidad:
                datosArcGIS.rut_entidad || "",
            nombre_revisor_ep:
                datosArcGIS.nombre_revisor_ep || "",
            rut_revisor_ep:
                datosArcGIS.rut_revisor_ep || "",
            email_revidor_ep:
                datosArcGIS.email_revidor_ep || "",
            nombre_dirigente:
                datosArcGIS.nombre_dirigente || "",
            rut_dirigente:
                datosArcGIS.rut_dirigente || "",
            email_dirigente:
                datosArcGIS.email_dirigente || "",
            enlace_fotos:
                datosArcGIS.enlace_fotos || "",
  
            objectid:
                datosArcGIS.objectid || "",
            tabla_priorizada:
                datosArcGIS.tabla_priorizada || [],

            imagen: {

                _type:
                    "image",

                source:
                    imageBlob,

                format:
                    dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",

                width:
                    250,

                height:
                    180
            },
            imagenes_adjuntas:
                imagenesWord

        };

        console.log(
            "Datos template:",
            datos
        );

        // =====================================
        // TEMPLATE HANDLER
        // =====================================

        const handler =
            new TemplateHandler();

        // =====================================
        // PROCESAR DOCUMENTO
        // =====================================

        const documento =
            await handler.process(

                templateFile,

                datos
            );

        console.log(
            "Documento procesado"
        );

        // =====================================
        // DESCARGAR WORD
        // =====================================

        saveAs(

            documento,

            "Resultado.docx"
        );

        console.log(
            "Documento descargado"
        );

        document.body.innerHTML =
            "<h2>✅ Documento generado correctamente</h2>";
    }

    catch(error) {

        console.error(
            error
        );

        document.body.innerHTML =
            "<h2>❌ Error: " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
