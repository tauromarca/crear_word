<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word Template
    </title>

</head>

<body>

<h2>
    Generando documento...
</h2>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- ===================================== -->
<!-- SCRIPT PRINCIPAL -->
<!-- ===================================== -->

<script type="module">

import {

    TemplateHandler

} from "https://cdn.jsdelivr.net/npm/easy-template-x@7.2.4/+esm";

(async function () {

    try {

        console.log(
            "TemplateHandler:",
            TemplateHandler
        );

        // =====================================
        // LEER IMAGEN DESDE LOCALSTORAGE
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagenArcGIS en localStorage"
            );
        }

        console.log(
            "Imagen encontrada"
        );

        // =====================================
        // CONVERTIR IMAGEN A BLOB
        // =====================================

        const imageResponse =
            await fetch(
                dataUrl
            );

        const imageBlob =
            await imageResponse.blob();

        console.log(
            "Imagen convertida a Blob"
        );

        // =====================================
        // CARGAR TEMPLATE WORD
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const templateFile =
            await response.blob();

        console.log(
            "Template cargado"
        );

        // =====================================
        // DATOS TEMPLATE
        // =====================================

        const datos = {

            nombre:
                "Claudio Goldberg",

            fecha:
                new Date()
                .toLocaleDateString(),

            observacion:
                "Documento generado desde ArcGIS Experience Builder",

            imagen: {

                _type:
                    "image",

                source:
                    imageBlob,

                format:
                    dataUrl.includes("png")
                    ? "image/png"
                    : "image/jpeg",

                width:
                    600,

                height:
                    350
            }
        };

        console.log(
            "Datos preparados"
        );

        // =====================================
        // TEMPLATE HANDLER
        // =====================================

        const handler =
            new TemplateHandler();

        // =====================================
        // PROCESAR DOCUMENTO
        // =====================================

        const documento =
            await handler.process(

                templateFile,

                datos
            );

        console.log(
            "Documento procesado"
        );

        // =====================================
        // DESCARGAR WORD
        // =====================================

        saveAs(

            documento,

            "Resultado.docx"
        );

        console.log(
            "Documento descargado"
        );

        document.body.innerHTML =
            "<h2>✅ Documento generado correctamente</h2>";
    }

    catch(error) {

        console.error(
            error
        );

        document.body.innerHTML =
            "<h2>❌ Error: " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
