<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Generar Word
    </title>

</head>

<body>

<h2>
    Generando Word...
</h2>

<!-- ===================================== -->
<!-- PIZZIP -->
<!-- ===================================== -->

<script src="https://unpkg.com/pizzip@3.1.5/dist/pizzip.js"></script>

<!-- ===================================== -->
<!-- DOCXTEMPLATER -->
<!-- ===================================== -->

<script src="https://unpkg.com/docxtemplater@3.46.0/build/docxtemplater.js"></script>

<!-- ===================================== -->
<!-- FILE SAVER -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

(async function () {

    try {

        console.log(
            "PizZip:",
            typeof PizZip
        );

        console.log(
            "docxtemplater:",
            typeof docxtemplater
        );

        // =====================================
        // LEER IMAGEN
        // =====================================

        const dataUrl =
            localStorage.getItem(
                "imagenArcGIS"
            );

        if (!dataUrl) {

            throw new Error(
                "No existe imagen"
            );
        }

        console.log(
            "Imagen cargada:",
            dataUrl.substring(0, 50)
        );

        // =====================================
        // TEMPLATE
        // =====================================

        const response =
            await fetch(
                "template.docx"
            );

        if (!response.ok) {

            throw new Error(
                "No existe template.docx"
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        // =====================================
        // ZIP
        // =====================================

        const zip =
            new PizZip(
                arrayBuffer
            );

        // =====================================
        // DOCXTEMPLATER
        // =====================================

        const doc =
            new window.docxtemplater(

                zip,

                {
                    paragraphLoop: true,
                    linebreaks: true
                }
            );

        // =====================================
        // VARIABLES TEMPLATE
        // =====================================

        doc.render({

            imagen: {

                width: 600,

                height: 350,

                data: dataUrl
            }
        });

        // =====================================
        // GENERAR DOCX
        // =====================================

        const blob =
            doc.getZip().generate({

                type: "blob",

                mimeType:
                    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

        // =====================================
        // DESCARGAR
        // =====================================

        saveAs(

            blob,

            "MapaArcGIS.docx"
        );

        document.body.innerHTML =
            "<h2>✅ Word generado</h2>";
    }

    catch(error) {

        console.error(error);

        document.body.innerHTML =
            "<h2>❌ " +
            error.message +
            "</h2>";
    }

})();

</script>

</body>

</html>
